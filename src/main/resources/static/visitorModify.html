<!DOCTYPE html>
<html lang="kr">
<head>
  <meta charset="UTF-8">
  <title>방명록 수정 화면</title>
  <link rel="stylesheet" href="css/visitor.css">
</head>
<body>
<h1>방명록 수정</h1>
<form action="/vupdate" method="post">
  <input type="hidden" name="id" th:value="${vt.id}">
  <input type="text" name="name" placeholder="이름을 입력하세요." required><br>
  <textarea name="memo" cols="35" rows="10" placeholder="내용을 입력하세요." required></textarea><br>
  <input type="submit" value="수정">
  <input type="submit" value="목록" onclick="location.href='VisitorMain.html'">
</form>
</body>
</html>
