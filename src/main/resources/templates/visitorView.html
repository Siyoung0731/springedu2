<!DOCTYPE html>
<html xmls:th="http://thymeleaf.org" xmlns:xmls="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>방명록 목록</title>
  <link rel="stylesheet" href="css/visitor.css">
</head>
<body>
  <table>
    <tr>
      <td>작성자</td>
      <td>작성일</td>
      <td>작성내용</td>
    </tr>
    <tr th:each="vt : ${visitors}">

      <td>[[${vt.writeDate}]]</td>
      <td>[[${vt.memo}]]</td>
    </tr>
  </table>
</body>
</html>
