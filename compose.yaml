version: '3.8' # 도커 컴포즈의 버전 규격입니다.

services:
  postgres-container:
    image: postgres:15
    container_name: postgres-container
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgre
      POSTGRES_USER: spring
      POSTGRES_PASSWORD: 1234
      TZ: Asia/Seoul
    volumes:
      - springedu2-postgres-data:/var/lib/postgresql/data
    networks:
      - springboot-postgres-net

# --- 여기가 가장 중요합니다! (건물 밑바닥 공사) ---
# 위에서 언급한 창고 이름과 네트워크 이름을 도면 맨 밑에 반드시 선언해 주어야 합니다.

volumes:
  springedu2-postgres-data:

networks:
  springboot-postgres-net:
    driver: bridge